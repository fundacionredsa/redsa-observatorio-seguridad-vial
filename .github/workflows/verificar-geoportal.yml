name: Verificar geoportal

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contratos-y-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
      - uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: python -m unittest discover -s tests_python -v
      - run: python scripts/generar_diccionario_geojson.py
      - run: python scripts/verificar_datos_publicados.py
      - run: npm test
